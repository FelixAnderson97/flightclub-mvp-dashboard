name: Daily HGEM Dashboard Update

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check it's 7am UK
        id: timegate
        run: |
          UK_HOUR=$(TZ='Europe/London' date +%H)
          echo "UK hour is $UK_HOUR"
          if [ "$GITHUB_EVENT_NAME" = "schedule" ] && [ "$UK_HOUR" != "07" ]; then
            echo "Not 7am UK ($UK_HOUR). Exiting cleanly."
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "should_run=true" >> $GITHUB_OUTPUT

      - name: Checkout repo
        if: steps.timegate.outputs.should_run != 'false'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.timegate.outputs.should_run != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.timegate.outputs.should_run != 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: steps.timegate.outputs.should_run != 'false'
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Scrape HGEM Hub
        if: steps.timegate.outputs.should_run != 'false'
        id: scrape
        env:
          HGEM_USERNAME: ${{ secrets.HGEM_USERNAME }}
          HGEM_PASSWORD: ${{ secrets.HGEM_PASSWORD }}
        run: |
          cd pipeline
          python scrape_hgem.py || echo "scrape_failed=true" >> $GITHUB_OUTPUT

      - name: Upload scrape screenshots
        if: always() && steps.timegate.outputs.should_run != 'false'
        uses: actions/upload-artifact@v4
        with:
          name: scrape-screenshots-${{ github.run_id }}
          path: Outputs/scrape_screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Run pipeline
        if: steps.timegate.outputs.should_run != 'false'
        run: |
          cd pipeline
          python pipeline.py

      - name: Promote dashboard to repo root
        if: steps.timegate.outputs.should_run != 'false'
        run: |
          cp Outputs/dashboard.html index.html

      - name: Commit and push
        if: steps.timegate.outputs.should_run != 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data/ Outputs/changelog.md Outputs/snapshot.json Outputs/anomalies.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update dashboard $(TZ='Europe/London' date '+%Y-%m-%d %H:%M %Z')"
            git push
          fi

      - name: Anomaly summary
        if: steps.timegate.outputs.should_run != 'false'
        run: |
          if [ -f Outputs/anomalies.md ]; then
            echo "## ⚠️ Anomalies this run" >> $GITHUB_STEP_SUMMARY
            cat Outputs/anomalies.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ No anomalies this run" >> $GITHUB_STEP_SUMMARY
          fi
